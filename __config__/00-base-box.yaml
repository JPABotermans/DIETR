neck_prj_act: True
neck_prj_nrm: True

head_channels:
  scale_3: [192, 192]
  scale_4: [192, 192]
  scale_5: [192, 192]
head_n_layers: 6
head_dim_feedfoward: 1024
head_n_sample_points: 4
head_n_query: 300
head_n_attn_head: 8
